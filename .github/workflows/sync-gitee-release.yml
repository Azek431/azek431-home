name: Sync GitHub Release to Gitee

# =============================================================================
# GitHub Release → Gitee Release 自动同步
#
# 工作原理：
# 1. 在 GitHub 发布或编辑 Release 后自动触发；
# 2. 也可以从 Actions 页面输入标签手动补同步；
# 3. 从 GitHub API 读取完整发行版信息；
# 4. 等待 Gitee 仓库镜像同步对应 Git 标签；
# 5. 调用 Gitee API 创建或更新同标签发行版。
#
# 注意：
# - 代码和标签由 Gitee 的 GitHub 镜像功能负责同步；
# - 本工作流只负责等待标签并同步 Release 元数据；
# - GitHub Release 附件不会上传到 Gitee；
# - Gitee 发行说明会保留 GitHub 原发行版链接。
# =============================================================================

on:
  # 首次发布 Release 或后来编辑标题、说明时自动同步。
  release:
    types:
      - published
      - edited

  # 自动同步失败、修改 Token 或需要同步历史版本时，
  # 可以从 GitHub Actions 页面手动输入标签重新执行。
  workflow_dispatch:
    inputs:
      tag:
        description: '需要同步的 GitHub Release 标签，例如 v0.1.0'
        required: true
        type: string

# 只读取 GitHub 仓库内容和 Release 数据。
# Gitee 写入权限由 GITEE_TOKEN 单独提供。
permissions:
  contents: read

# 同一个标签只允许一个同步任务运行，避免重复创建或同时更新。
concurrency:
  group: sync-gitee-release-${{ github.repository }}-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  # Gitee 用户名和仓库名不是敏感信息，直接写在 env 中，
  # 不需要额外占用 GitHub Secrets。
  GITEE_OWNER: Azek431
  GITEE_REPO: azek431-home
  GITEE_DEFAULT_BRANCH: main
  GITEE_MIRROR_URL: https://gitee.com/Azek431/azek431-home.git

jobs:
  sync-gitee-release:
    name: Create or update Gitee release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # -----------------------------------------------------------------------
      # 1. 检查 Gitee Token
      # -----------------------------------------------------------------------
      - name: Validate Gitee token
        shell: bash
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -Eeuo pipefail

          if [[ -z "${GITEE_TOKEN}" ]]; then
            echo "::error::缺少 GitHub Actions Secret：GITEE_TOKEN"
            echo "::error::请进入仓库 Settings → Secrets and variables → Actions 添加。"
            exit 1
          fi

      # -----------------------------------------------------------------------
      # 2. 获取 GitHub Release 完整数据
      #
      # 自动触发时使用 github.event.release.tag_name；
      # 手动触发时使用 inputs.tag。
      #
      # 不直接依赖事件正文，是为了让自动与手动运行共用同一套逻辑。
      # -----------------------------------------------------------------------
      - name: Fetch GitHub release metadata
        id: github_release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -Eeuo pipefail

          TAG_NAME="${EVENT_TAG:-${INPUT_TAG:-}}"
          TAG_NAME="$(printf '%s' "${TAG_NAME}" | xargs)"

          if [[ -z "${TAG_NAME}" ]]; then
            echo "::error::没有取得需要同步的 Release 标签。"
            exit 1
          fi

          export TAG_NAME

          python3 <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ["GH_TOKEN"]
          repository = os.environ["GITHUB_REPOSITORY"]
          tag = os.environ["TAG_NAME"]

          encoded_tag = urllib.parse.quote(tag, safe="")
          url = (
              f"https://api.github.com/repos/"
              f"{repository}/releases/tags/{encoded_tag}"
          )

          request = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "azek431-home-release-sync",
              },
          )

          try:
              with urllib.request.urlopen(
                  request,
                  timeout=60,
              ) as response:
                  release = json.loads(
                      response.read().decode("utf-8")
                  )
          except urllib.error.HTTPError as error:
              body = error.read().decode(
                  "utf-8",
                  errors="replace",
              )
              print(
                  f"GitHub API HTTP {error.code}: {body}"
              )
              raise
          except urllib.error.URLError as error:
              print(f"GitHub API network error: {error}")
              raise

          output_path = os.path.join(
              os.environ["RUNNER_TEMP"],
              "github-release.json",
          )

          with open(
              output_path,
              "w",
              encoding="utf-8",
          ) as output:
              json.dump(
                  release,
                  output,
                  ensure_ascii=False,
                  indent=2,
              )

          print(f"Release tag: {release.get('tag_name')}")
          print(
              f"Release name: "
              f"{release.get('name') or tag}"
          )
          print(
              f"Prerelease: "
              f"{release.get('prerelease', False)}"
          )
          print(
              f"GitHub URL: "
              f"{release.get('html_url', '')}"
          )
          PY

          echo "tag=${TAG_NAME}" >> "${GITHUB_OUTPUT}"

          {
            echo "## GitHub 发行版"
            echo
            echo "- 标签：\`${TAG_NAME}\`"
            echo "- 仓库：\`${GITHUB_REPOSITORY}\`"
            echo "- 触发方式：\`${GITHUB_EVENT_NAME}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      # -----------------------------------------------------------------------
      # 3. 等待 Gitee 镜像同步标签
      #
      # 原 cysj-data 工作流固定等待 180 秒。
      # 这里改成主动轮询：
      # - 立即检查一次；
      # - 没同步时每 30 秒检查一次；
      # - 最多检查 12 次，总等待时间约 6 分钟。
      #
      # 编辑已有 Release 时，标签通常已经存在，会立即进入下一步。
      # -----------------------------------------------------------------------
      - name: Wait for Gitee mirror tag
        shell: bash
        env:
          TAG_NAME: ${{ steps.github_release.outputs.tag }}
        run: |
          set -Eeuo pipefail

          MAX_ATTEMPTS=12
          WAIT_SECONDS=30
          TAG_FOUND=false

          echo "等待 Gitee 镜像出现标签：${TAG_NAME}"
          echo "镜像仓库：${GITEE_MIRROR_URL}"

          for ATTEMPT in $(seq 1 "${MAX_ATTEMPTS}"); do
            echo
            echo "第 ${ATTEMPT}/${MAX_ATTEMPTS} 次检查……"

            if git ls-remote \
              --exit-code \
              --tags \
              "${GITEE_MIRROR_URL}" \
              "refs/tags/${TAG_NAME}" \
              "refs/tags/${TAG_NAME}^{}" \
              > "${RUNNER_TEMP}/gitee-tag.txt" \
              2> "${RUNNER_TEMP}/gitee-tag-error.txt"
            then
              TAG_FOUND=true

              echo "Gitee 已同步标签 ${TAG_NAME}："
              cat "${RUNNER_TEMP}/gitee-tag.txt"

              break
            fi

            if [[ "${ATTEMPT}" -lt "${MAX_ATTEMPTS}" ]]; then
              echo "标签暂未出现，${WAIT_SECONDS} 秒后重新检查……"
              sleep "${WAIT_SECONDS}"
            fi
          done

          if [[ "${TAG_FOUND}" != "true" ]]; then
            echo "::error::等待约 6 分钟后，Gitee 仍未出现标签 ${TAG_NAME}。"
            echo "::error::请检查 Gitee 仓库的 GitHub 镜像设置。"

            if [[ -s "${RUNNER_TEMP}/gitee-tag-error.txt" ]]; then
              echo
              echo "最后一次 Git 检查信息："
              cat "${RUNNER_TEMP}/gitee-tag-error.txt"
            fi

            exit 1
          fi

      # -----------------------------------------------------------------------
      # 4. 创建或更新 Gitee Release
      #
      # - 如果同标签 Release 不存在：POST 创建；
      # - 如果已经存在：PATCH 更新；
      # - 因此 published、edited 和手动重跑都不会产生重复发行版。
      # -----------------------------------------------------------------------
      - name: Create or update Gitee release
        id: gitee_release
        shell: bash
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG_NAME: ${{ steps.github_release.outputs.tag }}
        run: |
          set -Eeuo pipefail

          python3 <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ["GITEE_TOKEN"]
          owner = os.environ["GITEE_OWNER"]
          repository = os.environ["GITEE_REPO"]
          default_branch = os.environ[
              "GITEE_DEFAULT_BRANCH"
          ]
          tag = os.environ["TAG_NAME"]

          github_release_path = os.path.join(
              os.environ["RUNNER_TEMP"],
              "github-release.json",
          )

          with open(
              github_release_path,
              "r",
              encoding="utf-8",
          ) as source:
              github_release = json.load(source)

          release_name = (
              github_release.get("name")
              or github_release.get("tag_name")
              or tag
          )

          github_body = (
              github_release.get("body") or ""
          ).rstrip()

          github_release_url = (
              github_release.get("html_url") or ""
          )

          prerelease = bool(
              github_release.get(
                  "prerelease",
                  False,
              )
          )

          mirror_note = "\n".join(
              [
                  "## 镜像说明",
                  "",
                  "本发行版由 GitHub Actions 自动同步。",
                  "",
                  (
                      "- GitHub 原始发行版："
                      f"{github_release_url}"
                  ),
                  (
                      "- GitHub 仓库："
                      f"https://github.com/"
                      f"{os.environ['GITHUB_REPOSITORY']}"
                  ),
                  (
                      "- Gitee 镜像："
                      f"https://gitee.com/"
                      f"{owner}/{repository}"
                  ),
              ]
          )

          if github_body:
              release_body = (
                  f"{github_body}\n\n---\n\n"
                  f"{mirror_note}"
              )
          else:
              release_body = mirror_note

          base_url = (
              f"https://gitee.com/api/v5/repos/"
              f"{owner}/{repository}"
          )

          def api_request(
              method,
              url,
              data=None,
          ):
              encoded_data = None

              if data is not None:
                  encoded_data = urllib.parse.urlencode(
                      data
                  ).encode("utf-8")

              request = urllib.request.Request(
                  url,
                  data=encoded_data,
                  method=method,
                  headers={
                      "Accept": "application/json",
                      "Content-Type": (
                          "application/"
                          "x-www-form-urlencoded"
                      ),
                      "User-Agent": (
                          "azek431-home-release-sync"
                      ),
                  },
              )

              try:
                  with urllib.request.urlopen(
                      request,
                      timeout=60,
                  ) as response:
                      text = response.read().decode(
                          "utf-8"
                      )

                      if not text:
                          return None

                      return json.loads(text)

              except urllib.error.HTTPError as error:
                  error_body = error.read().decode(
                      "utf-8",
                      errors="replace",
                  )

                  print(
                      f"Gitee API HTTP "
                      f"{error.code}: {error_body}"
                  )
                  raise

              except urllib.error.URLError as error:
                  print(
                      f"Gitee API network error: "
                      f"{error}"
                  )
                  raise

          # 分页查找同标签 Release。
          # 即使以后发行版超过 100 个，也不会只检查第一页。
          existing_release = None

          for page in range(1, 11):
              query = urllib.parse.urlencode(
                  {
                      "access_token": token,
                      "page": page,
                      "per_page": 100,
                  }
              )

              releases = api_request(
                  "GET",
                  f"{base_url}/releases?{query}",
              )

              if not isinstance(releases, list):
                  raise RuntimeError(
                      "Gitee Releases API "
                      "返回了非列表数据。"
                  )

              for release in releases:
                  if release.get("tag_name") == tag:
                      existing_release = release
                      break

              if existing_release:
                  break

              if len(releases) < 100:
                  break

          payload = {
              "access_token": token,
              "tag_name": tag,
              "target_commitish": default_branch,
              "name": release_name,
              "body": release_body,
              "prerelease": (
                  "true" if prerelease else "false"
              ),
          }

          if existing_release:
              release_id = existing_release.get("id")

              if not release_id:
                  raise RuntimeError(
                      "找到 Gitee Release，"
                      "但响应中缺少 id。"
                  )

              print(
                  f"Updating Gitee release: "
                  f"{tag}, id={release_id}"
              )

              result = api_request(
                  "PATCH",
                  (
                      f"{base_url}/releases/"
                      f"{release_id}"
                  ),
                  payload,
              )

              operation = "updated"

          else:
              print(
                  f"Creating Gitee release: {tag}"
              )

              result = api_request(
                  "POST",
                  f"{base_url}/releases",
                  payload,
              )

              operation = "created"

          if not isinstance(result, dict):
              result = {}

          release_url = (
              result.get("html_url")
              or (
                  f"https://gitee.com/"
                  f"{owner}/{repository}/"
                  f"releases/tag/"
                  f"{urllib.parse.quote(tag, safe='')}"
              )
          )

          output_file = os.environ["GITHUB_OUTPUT"]

          with open(
              output_file,
              "a",
              encoding="utf-8",
          ) as output:
              output.write(
                  f"operation={operation}\n"
              )
              output.write(
                  f"url={release_url}\n"
              )

          print(
              f"Gitee release sync completed: "
              f"{operation}"
          )
          print(f"Gitee release URL: {release_url}")
          PY

      # -----------------------------------------------------------------------
      # 5. 输出运行摘要
      # -----------------------------------------------------------------------
      - name: Write synchronization summary
        shell: bash
        env:
          TAG_NAME: ${{ steps.github_release.outputs.tag }}
          OPERATION: ${{ steps.gitee_release.outputs.operation }}
          GITEE_RELEASE_URL: ${{ steps.gitee_release.outputs.url }}
        run: |
          set -Eeuo pipefail

          if [[ "${OPERATION}" == "created" ]]; then
            RESULT_TEXT="已创建 Gitee 发行版"
          else
            RESULT_TEXT="已更新 Gitee 发行版"
          fi

          {
            echo
            echo "## Gitee 同步完成"
            echo
            echo "- 结果：${RESULT_TEXT}"
            echo "- 标签：\`${TAG_NAME}\`"
            echo "- Gitee 仓库：https://gitee.com/${GITEE_OWNER}/${GITEE_REPO}"
            echo "- Gitee 发行版：${GITEE_RELEASE_URL}"
            echo
            echo "> GitHub Release 附件不会上传到 Gitee；"
            echo "> Gitee 发行说明中保留了 GitHub 原发行版链接。"
          } >> "${GITHUB_STEP_SUMMARY}"
